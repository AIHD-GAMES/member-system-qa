steps:
  # 1. Build the Docker image using Nginx
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'gcr.io/$PROJECT_ID/member-system-qa:$COMMIT_SHA',
      '.'
    ]

  # 2. Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/member-system-qa:$COMMIT_SHA']

  # 3. Deploy to Cloud Run (Service: member-system-qa, Region: asia-northeast1)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'member-system-qa'
      - '--image'
      - 'gcr.io/$PROJECT_ID/member-system-qa:$COMMIT_SHA'
      - '--region'
      - 'asia-northeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/member-system-qa:$COMMIT_SHA'
